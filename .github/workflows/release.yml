name: Release

# Builds installers and publishes a GitHub Release whenever a version tag is
# pushed (e.g. `git tag v1.0.0 && git push origin v1.0.0`). Can also be run
# manually from the Actions tab (pick a tag as the ref).
#
# Targets (per request): Windows (NSIS) and macOS Apple Silicon (.dmg).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# tauri-action needs write access to create the release.
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows — NSIS setup .exe only (no MSI)
          - platform: windows-latest
            args: "--bundles nsis"
          # macOS — Apple Silicon (M-series) .dmg only
          - platform: macos-latest
            args: "--target aarch64-apple-darwin --bundles dmg"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS Apple Silicon target
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Bumped from the default "v0-rust" to start a fresh cache namespace.
          # The v1.3.0 build failed while *restoring* the old cache (corrupt /
          # incomplete); a new prefix means a clean cache miss + fresh build,
          # then a healthy cache is saved under v1. Bump again if this recurs.
          prefix-key: "v1-rust"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signatures (required for in-app auto-update). Set both secrets
          # in the repo: private key contents + optional password.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # --- Optional macOS code signing (leave unset to ship unsigned) ---
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Museek ${{ github.ref_name }}"
          releaseBody: |
            ## What's new · 更新内容

            - **In-app updater · 应用内更新** — checks asynchronously after startup, shows an update card above Settings, and supports signed download, install, and relaunch from the About page.  
              启动后异步检查更新；有新版本时在「设置」上方显示提示卡片，并可在「关于」页完成签名校验、下载、安装与重启。
            - **Localized installers · 双语安装包** — Windows NSIS follows the system language (Chinese / English); macOS ships an Apple Silicon DMG with localized English / Chinese metadata.  
              Windows NSIS 随系统语言显示中文 / 英文；macOS 提供 Apple Silicon DMG 与中英本地化元数据。
            - **Architecture and playback · 架构与播放** — extracted playback, lyric, source, notification, and quality services for more reliable failover and maintenance.  
              拆分播放、歌词、音源、通知与音质服务，提升失败转移可靠性与后续可维护性。
            - **Polish · 体验优化** — refined loading feedback, lyrics cover transitions, window sizing, documentation, and the GitHub landing page.  
              优化加载反馈、歌词封面过渡、窗口尺寸、双语文档与 GitHub 落地页。

            ## Download · 下载

            下载下方对应平台的安装包：
            - **Windows**：`*_x64-setup.exe`（NSIS 安装包）
            - **macOS (Apple Silicon)**：`*_aarch64.dmg`

            已安装用户可在应用内「设置 → 关于 → 检查更新」直接升级（需本 Release 含 `latest.json` 与 `.sig`）。

            ⚠️ Museek 不内置任何音源；首次使用请在「设置 → 音源管理」导入兼容 lx-music 的音源脚本后再播放。

            **macOS 提示「“Museek”已损坏，无法打开」？** 这是未签名 / 未公证应用的正常现象（文件并未损坏）。把 Museek.app 拖入「应用程序」，再在「终端」执行下面这行，然后正常打开即可：
            `/usr/bin/xattr -rd com.apple.quarantine /Applications/Museek.app`
            （若提示 `-r` 无法识别，说明 PATH 里有其它 xattr，可改用：`find /Applications/Museek.app -exec /usr/bin/xattr -c {} \;`）
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
